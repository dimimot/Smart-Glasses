name: smart_glasses_app
description: A minimal Flutter app with TTS, camera and server communication.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.2.3
  image_picker: ^1.0.4
  http: ^1.2.0
  http_parser: ^4.1.2
  flutter_foreground_task: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
